<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Responsivo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="grid-container">
        <header class="header">
            <div class="logo">Minha Dashboard</div>
            <nav class="links">
                <a href="#">Início</a>
                <a href="#">Projetos</a>
                <a href="#">Contato</a>
            </nav>
        </header>
        
        <aside class="sidebar">
            <h3>Menu Lateral</h3>
            <ul>
                <li>Dashboard</li>
                <li>Configurações</li>
            </ul>
        </aside>
        
        <main class="main-content">
            <h1 class="titulo-dinamico">Galeria Responsiva</h1>
            
            <section class="gallery">
                <div class="card">
                    <img src="https://placeholder.com" alt="Exemplo">
                    <p>Card 1</p>
                </div>
                <div class="card">
                    <img src="https://placeholder.com" alt="Exemplo">
                    <p>Card 2</p>
                </div>
                <div class="card">
                    <img src="https://placeholder.com" alt="Exemplo">
                    <p>Card 3</p>
                </div>
            </section>
        </main>
        
        <footer class="footer">
            <p>Responsividade</p>
        </footer>
    </div>

</body>
</html>
